services: 
  postgres:
    image: postgres:16
    container_name: postgres-server
    restart: unless-stopped
    environment: 
      POSTGRES_USER: "Genesis"
      POSTGRES_PASSWORD: "27022006"
      POSTGRES_DB: "knowledgehub"
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis:
    image: redis:7
    container_name: redis-server
    restart: unless-stopped
    ports: 
      - "6379:6379"
    volumes: 
      - redis_data:/data
  
volumes:
  postgres_data:
  redis_data: